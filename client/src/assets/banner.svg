<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
    <!-- Background -->
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a2d45" stroke-width="1"/>
        </pattern>
        <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="1200" height="400" fill="#0f172a"/>
    <rect width="1200" height="400" fill="url(#grid)" opacity="0.1"/>

    <!-- Logo Section -->
    <g transform="translate(150, 100) scale(2)">
        <!-- Clean Rounded Hexagon -->
        <path d="M50 8 L88 30 V70 L50 92 L12 70 V30 Z" fill="url(#primary)" />
        <!-- Modern Geometric S/B Concept -->
        <path d="M35 35 H65 M35 50 H65 M35 65 H50" 
              stroke="white" 
              stroke-width="8" 
              stroke-linecap="round" 
              stroke-linejoin="round"/>
    </g>

    <!-- Text Section -->
    <g transform="translate(400, 230)">
        <text font-family="Inter, system-ui, sans-serif" font-size="96" font-weight="bold" fill="#f8fafc">SkillSwap</text>
        <text x="5" y="60" font-family="Inter, system-ui, sans-serif" font-size="32" fill="#94a3b8">Peer-to-Peer Student Skill Exchange</text>
    </g>
</svg>